{{define "content"}}
<div class="auth-page">
    <div class="auth-card">
        <h1>Mobile-ID</h1>
        {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
        <form action="/auth/mid/init" method="POST">
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
            <div class="form-group">
                <label for="id_code">Isikukood</label>
                <input type="text" id="id_code" name="id_code" placeholder="60001019906" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+37200000766" required>
                <div class="form-hint">Include country code, e.g. +372 for Estonia</div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign in with Mobile-ID</button>
        </form>
        <p class="auth-link"><a href="/auth/signin">Back to sign in</a></p>
    </div>
</div>
{{end}}
